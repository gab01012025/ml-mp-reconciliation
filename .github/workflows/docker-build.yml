name: Build and Push Docker Images

on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-tiny-shopee-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push tiny-shopee-bot
        uses: docker/build-push-action@v5
        with:
          context: ./tiny-shopee-bot
          file: ./tiny-shopee-bot/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/gab01012025/tiny-shopee-bot:latest
            ${{ env.REGISTRY }}/gab01012025/tiny-shopee-bot:${{ github.sha }}
